name: Publish to Comfy Registry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

jobs:
  publish-node:
    name: Publish Custom Node
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate tag matches pyproject version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys

          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib

          tag = os.environ["GITHUB_REF_NAME"].strip()
          normalized_tag = tag[1:] if tag.startswith("v") else tag

          pyproject = pathlib.Path("pyproject.toml")
          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          version = data["project"]["version"].strip()

          if normalized_tag != version:
              print(
                  f"Tag '{tag}' does not match pyproject version '{version}'.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"Publishing version {version} from tag {tag}.")
          PY

      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
